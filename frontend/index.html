<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMUQ MSA Links</title>
    <meta name="description" content="Links and resources from the Muslim Students Association at Carnegie Mellon University in Qatar" />
    <meta property="og:title" content="CMUQ MSA Links" />
    <meta property="og:description" content="Links and resources from the Muslim Students Association at CMU Qatar" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕌</text></svg>" />
    <!-- Logo preload: kicks off the logo image fetch during HTML parse so it
         arrives in parallel with the JS bundle. Bootstrap data is now
         server-injected by the backend as window.__BOOTSTRAP__, so no
         /api/public/bootstrap preload is needed. If the backend HTML shell
         is unavailable (dev mode, partial deploy) the client falls back to
         fetching /api/public/bootstrap at runtime. -->
    <link rel="preload" as="image" href="/api/branding/logo" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
